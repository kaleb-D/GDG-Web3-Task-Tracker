[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.19"

# Show detailed test output
verbosity = 2

# Enable gas reporting
gas_reports = ["SavingsBank"]

[profile.default.fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
localhost = "http://127.0.0.1:8545"
# sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
